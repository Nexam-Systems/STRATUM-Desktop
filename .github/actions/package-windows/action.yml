name: 'Package STRATUM (Windows)'
description: >-
  Turns an already-built STRATUM tree into shippable artifacts: deploys all Qt
  runtime dependencies via windeployqt, produces the native NSIS .exe installer
  (QGC's existing path), and harvests the deployed tree into a true Windows
  Installer .msi. Single source of truth for packaging so ci-build.yml and
  build-on-tag.yml never drift.

# This is a composite action. It assumes the caller has already run the QGC
# build (Configure + Build) and that qt-cmake / Qt bin are on PATH for the
# windeployqt install step.

inputs:
  source-dir:
    description: 'QGC source dir (contains the build/ tree). Relative to workspace.'
    required: false
    default: 'qgroundcontrol'
  build-dir:
    description: 'CMake build dir, relative to source-dir.'
    required: false
    default: 'build'

outputs:
  exe-path:
    description: 'Absolute path to the bare STRATUM.exe.'
    value: ${{ steps.collect.outputs.exe_path }}
  nsis-path:
    description: 'Absolute path to the NSIS .exe installer.'
    value: ${{ steps.collect.outputs.nsis_path }}
  msi-path:
    description: 'Absolute path to the .msi installer.'
    value: ${{ steps.collect.outputs.msi_path }}
  version:
    description: 'Normalized numeric version used for the MSI.'
    value: ${{ steps.version.outputs.version }}

runs:
  using: composite
  steps:
    # ------------------------------------------------------------------ #
    # Toolchain: NSIS (for QGC's nullsoft_installer.nsi) and WiX v3
    # (heat/candle/light) for the MSI. Both are usually present on the
    # windows-2022 image; install only if missing so we don't depend on
    # image drift.
    # ------------------------------------------------------------------ #
    - name: Ensure NSIS + WiX toolset
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        $nsis = Get-ChildItem 'C:\Program Files (x86)\NSIS\makensis.exe',
                              'C:\Program Files\NSIS\makensis.exe' -ErrorAction SilentlyContinue |
                Select-Object -First 1
        if (-not $nsis) {
          Write-Host "NSIS not found - installing via Chocolatey."
          choco install nsis -y --no-progress
        } else {
          Write-Host "NSIS present: $($nsis.FullName)"
        }

        $heat = Get-ChildItem 'C:\Program Files (x86)\WiX Toolset v3*\bin\heat.exe' -ErrorAction SilentlyContinue |
                Select-Object -First 1
        if (-not $heat) {
          Write-Host "WiX v3 not found - installing via Chocolatey."
          choco install wixtoolset -y --no-progress
          $heat = Get-ChildItem 'C:\Program Files (x86)\WiX Toolset v3*\bin\heat.exe' -ErrorAction SilentlyContinue |
                  Select-Object -First 1
        }
        if (-not $heat) { Write-Error "WiX heat.exe still not found after install."; exit 1 }
        Write-Host "WiX present: $($heat.FullName)"
        # Expose WiX bin (candle/light/heat) to subsequent steps.
        "$(Split-Path $heat.FullName)" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

    # ------------------------------------------------------------------ #
    # Deploy + NSIS installer. `cmake --install` runs the QGC Qt deploy
    # script (windeployqt -> staging\bin\*) AND CreateWinInstaller.cmake
    # (makensis -> STRATUM-installer-AMD64.exe in the build dir).
    # ------------------------------------------------------------------ #
    - name: Deploy dependencies + build NSIS installer
      shell: pwsh
      working-directory: ${{ inputs.source-dir }}
      run: |
        $ErrorActionPreference = 'Stop'
        $staging = Join-Path (Get-Location) 'staging'
        if (Test-Path $staging) { Remove-Item $staging -Recurse -Force }
        cmake --install "${{ inputs.build-dir }}" --prefix "$staging"
        if ($LASTEXITCODE -ne 0) { Write-Error "cmake --install failed"; exit 1 }
        if (-not (Test-Path (Join-Path $staging 'bin\STRATUM.exe'))) {
          Write-Error "Deployed STRATUM.exe not found under staging\bin"; exit 1
        }
        Write-Host "Staging tree:"; Get-ChildItem $staging | Format-Table -AutoSize

    # ------------------------------------------------------------------ #
    # Derive a numeric MSI ProductVersion. git describe gives e.g.
    # "v1.2.3-5-gabc123" or just "v1.2.3"; MSI requires digits-only a.b.c[.d].
    # We take the leading numeric dotted run; fall back to 0.0.0.
    # ------------------------------------------------------------------ #
    - name: Normalize version for MSI
      id: version
      shell: pwsh
      working-directory: ${{ inputs.source-dir }}
      run: |
        $ErrorActionPreference = 'SilentlyContinue'
        $raw = (git describe --tags --always 2>$null)
        if (-not $raw) { $raw = '0.0.0' }
        $m = [regex]::Match($raw, '(\d+)\.(\d+)\.(\d+)(?:\.(\d+))?')
        if ($m.Success) { $ver = $m.Value } else { $ver = '0.0.0' }
        # MSI majors/minors must be <= 255; clamp defensively.
        $parts = $ver.Split('.') | ForEach-Object { [int]$_ }
        if ($parts[0] -gt 255) { $parts[0] = 255 }
        if ($parts[1] -gt 255) { $parts[1] = 255 }
        $ver = ($parts -join '.')
        Write-Host "Raw describe: $raw -> MSI version: $ver"
        "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    # ------------------------------------------------------------------ #
    # Build the MSI: harvest the staging tree, then candle/light it against
    # the stable authoring file at installer/windows/stratum.wxs.
    # ------------------------------------------------------------------ #
    - name: Build MSI (WiX)
      id: msi
      shell: pwsh
      working-directory: ${{ inputs.source-dir }}
      env:
        APP_VERSION: ${{ steps.version.outputs.version }}
      run: |
        $ErrorActionPreference = 'Stop'
        $staging = Join-Path (Get-Location) 'staging'
        $wxs     = Join-Path $env:GITHUB_WORKSPACE 'installer\windows\stratum.wxs'
        $outDir  = Join-Path (Get-Location) 'build\msi'
        New-Item -ItemType Directory -Force -Path $outDir | Out-Null
        $msiOut  = Join-Path $outDir "STRATUM-$($env:APP_VERSION)-x64.msi"

        # 1. Harvest the deployed payload into a component group.
        #    -srd suppress root dir, -scom/-sreg/-sfrag keep it lean,
        #    -gg generate component GUIDs, -var var.PayloadDir parametrizes source.
        heat dir "$staging" `
          -nologo -cg PayloadComponents -dr INSTALLFOLDER -ke `
          -srd -scom -sreg -sfrag -gg -g1 `
          -var var.PayloadDir `
          -out "$outDir\payload.wxs"
        if ($LASTEXITCODE -ne 0) { Write-Error "heat failed"; exit 1 }

        # 2. Compile both authoring files.
        candle -nologo -arch x64 `
          "-dPayloadDir=$staging" `
          "-dAppVersion=$($env:APP_VERSION)" `
          "-dManufacturer=Nexam Systems" `
          -out "$outDir\" `
          "$wxs" "$outDir\payload.wxs"
        if ($LASTEXITCODE -ne 0) { Write-Error "candle failed"; exit 1 }

        # 3. Link into the MSI (WixUIExtension for the install wizard).
        light -nologo -ext WixUIExtension -spdb `
          -cultures:en-us `
          -out "$msiOut" `
          "$outDir\stratum.wixobj" "$outDir\payload.wixobj"
        if ($LASTEXITCODE -ne 0) { Write-Error "light failed"; exit 1 }

        if (-not (Test-Path $msiOut)) { Write-Error "MSI not produced"; exit 1 }
        Write-Host "Built MSI: $msiOut"
        "msi_path=$msiOut" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    # ------------------------------------------------------------------ #
    # Resolve final artifact paths for the caller.
    # ------------------------------------------------------------------ #
    - name: Collect artifact paths
      id: collect
      shell: pwsh
      working-directory: ${{ inputs.source-dir }}
      run: |
        $ErrorActionPreference = 'Stop'

        $exe = Get-ChildItem -Path "${{ inputs.build-dir }}" -Recurse -Filter STRATUM.exe |
               Where-Object { $_.FullName -notmatch '\\staging\\' } |
               Select-Object -First 1
        if (-not $exe) { Write-Error "STRATUM.exe not found"; exit 1 }

        $nsis = Get-ChildItem -Path "${{ inputs.build-dir }}" -Recurse -Filter 'STRATUM-installer-*.exe' |
                Select-Object -First 1
        if (-not $nsis) { Write-Error "NSIS installer not found"; exit 1 }

        "exe_path=$($exe.FullName)"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        "nsis_path=$($nsis.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        "msi_path=${{ steps.msi.outputs.msi_path }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

        Write-Host "exe : $($exe.FullName)"
        Write-Host "nsis: $($nsis.FullName)"
        Write-Host "msi : ${{ steps.msi.outputs.msi_path }}"
