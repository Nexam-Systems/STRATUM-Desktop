name: Build on tag (Windows / MSVC / Qt)

# Fires when finish-feature.sh pushes a vX.Y.Z tag. A green run proves the tagged
# version compiles on the SAME toolchain as BUILD-Windows.md: MSVC 2022 + Qt + Ninja.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}   # allow manual runs for debugging

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep these aligned with qgroundcontrol/build-config.json and BUILD-Windows.md.
  QT_VERSION: '6.10.3'
  QT_ARCH: 'win64_msvc2022_64'
  BUILD_TYPE: 'Release'

jobs:
  build-windows:
    runs-on: windows-2022          # ships Visual Studio 2022 (v143)
    timeout-minutes: 120           # QGC is a large tree; first configure is slow

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Hard fork: QGC source is vendored as ordinary files in this repo.
          # There is NO submodule. Pulling one here would have fetched pristine
          # upstream QGC and dropped all STRATUM branding/AOP work ("no branding").
          submodules: false
          fetch-depth: 0           # full history so the tag/describe works

      - name: Set up MSVC (cl.exe on PATH)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ env.QT_ARCH }}
          # Authoritative list copied verbatim from qgroundcontrol/.github/build-config.json
          # ("qt_modules"). This is exactly what QGC's own CI installs — keep it in sync
          # if you ever update the vendored QGC tree.
          modules: >-
            qtgraphs
            qtlocation
            qtpositioning
            qtspeech
            qtmultimedia
            qtserialport
            qtimageformats
            qtshadertools
            qtconnectivity
            qtquick3d
            qtsensors
            qtscxml
            qtwebsockets
            qthttpserver
          cache: true              # cache the Qt install between runs

      - name: Configure (qt-cmake + Ninja)
        working-directory: qgroundcontrol
        shell: cmd
        run: >-
          "%QT_ROOT_DIR%\bin\qt-cmake.bat" -B build -G Ninja
          -DCMAKE_BUILD_TYPE=%BUILD_TYPE%
          -DQGC_BUILD_TESTING=OFF

      - name: Build
        working-directory: qgroundcontrol
        shell: cmd
        run: cmake --build build --parallel

      # The build succeeding IS the verification. The steps below deploy all Qt
      # dependencies, package both installer formats (NSIS .exe + .msi), and
      # publish the bare exe plus both installers.
      - name: Package (deploy + NSIS + MSI)
        id: package
        uses: ./.github/actions/package-windows
        with:
          source-dir: qgroundcontrol
          build-dir: build

      - name: Upload bare executable
        uses: actions/upload-artifact@v4
        with:
          name: STRATUM-exe-${{ github.ref_name }}
          path: ${{ steps.package.outputs.exe-path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: STRATUM-installer-nsis-${{ github.ref_name }}
          path: ${{ steps.package.outputs.nsis-path }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: STRATUM-installer-msi-${{ github.ref_name }}
          path: ${{ steps.package.outputs.msi-path }}
          if-no-files-found: error
          retention-days: 14

      # Attach the bare exe and both installers to the GitHub Release, if one exists.
      - name: Attach artifacts to Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $exists = gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag `
              "${{ steps.package.outputs.exe-path }}" `
              "${{ steps.package.outputs.nsis-path }}" `
              "${{ steps.package.outputs.msi-path }}" --clobber
          } else {
            Write-Host "No Release for $tag (tag pushed without --release). Artifacts still available under Actions."
          }
